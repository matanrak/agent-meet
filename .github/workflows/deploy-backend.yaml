name: Build Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE: reg.matan.cc/agentmeet-api
      SHA_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t "$IMAGE:$SHA_TAG" -t "$IMAGE:latest" backend/

      - name: Push to registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login reg.matan.cc -u "$REGISTRY_USERNAME" --password-stdin
          docker push "$IMAGE:$SHA_TAG"
          docker push "$IMAGE:latest"
